display_information:
  name: FinOps Agent
  description: Active AWS cost remediation via ChatOps and Step Functions
  background_color: "#1d1f21"

features:
  bot_user:
    display_name: FinOps Agent
    always_online: true

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - im:write

settings:
  interactivity:
    is_enabled: true
    # Replace this URL after first pulumi up with the slack_webhook_url output
    request_url: https://PLACEHOLDER.execute-api.eu-west-2.amazonaws.com/slack/action
  org_deploy_enabled: false
  socket_mode_enabled: false
  # token_rotation_enabled is false for PoC.
  # Production: enable and implement the rotation_endpoint handler
  # in the Gateway Lambda before going live with real workspace data.
  token_rotation_enabled: false
